apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: medback
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/component: middleware
    app.kubernetes.io/part-of: medback-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/component: middleware
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
      protocol: TCP
