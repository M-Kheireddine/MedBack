apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-llama3-pull
  namespace: medback
  labels:
    app.kubernetes.io/name: ollama-llama3-pull
    app.kubernetes.io/component: middleware
    app.kubernetes.io/part-of: medback-platform
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama-llama3-pull
        app.kubernetes.io/component: middleware
        app.kubernetes.io/part-of: medback-platform
    spec:
      restartPolicy: Never
      containers:
        - name: ollama-pull
          image: ollama/ollama:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: OLLAMA_HOST
              value: http://ollama:11434
          command:
            - sh
            - -c
            - |
              until ollama list >/dev/null 2>&1; do
                sleep 5
              done
              ollama pull llama3
