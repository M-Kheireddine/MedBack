apiVersion: apps/v1
kind: Deployment
metadata:
  name: med-discovery
  namespace: medback
  labels:
    app.kubernetes.io/name: med-discovery
    app.kubernetes.io/component: infrastructure
    app.kubernetes.io/part-of: medback-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: med-discovery
      app.kubernetes.io/component: infrastructure
  template:
    metadata:
      labels:
        app.kubernetes.io/name: med-discovery
        app.kubernetes.io/component: infrastructure
        app.kubernetes.io/part-of: medback-platform
    spec:
      containers:
        - name: med-discovery
          image: kheireddinemechergui/med-discovery:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8761
              protocol: TCP
          env:
            - name: SPRING_APPLICATION_NAME
              value: med-discovery-service
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 25
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 50
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
