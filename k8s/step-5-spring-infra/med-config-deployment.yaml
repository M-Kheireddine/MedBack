apiVersion: apps/v1
kind: Deployment
metadata:
  name: med-config
  namespace: medback
  labels:
    app.kubernetes.io/name: med-config
    app.kubernetes.io/component: infrastructure
    app.kubernetes.io/part-of: medback-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: med-config
      app.kubernetes.io/component: infrastructure
  template:
    metadata:
      labels:
        app.kubernetes.io/name: med-config
        app.kubernetes.io/component: infrastructure
        app.kubernetes.io/part-of: medback-platform
    spec:
      containers:
        - name: med-config
          image: kheireddinemechergui/med-config-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8086
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: native
            - name: SPRING_APPLICATION_NAME
              value: med-config-service
            - name: SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS
              value: file:/config-repo/{profile}
          readinessProbe:
            httpGet:
              path: /api/actuator/health
              port: 8086
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /api/actuator/health
              port: 8086
            initialDelaySeconds: 45
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: med-config-repository
              mountPath: /config-repo/prod/application.yml
              subPath: application.yml
            - name: med-config-repository
              mountPath: /config-repo/prod/med-user-service.yml
              subPath: med-user-service.yml
            - name: med-config-repository
              mountPath: /config-repo/prod/med-core-service.yml
              subPath: med-core-service.yml
            - name: med-config-repository
              mountPath: /config-repo/prod/med-notification-service.yml
              subPath: med-notification-service.yml
            - name: med-config-repository
              mountPath: /config-repo/prod/med-chatboot-service.yml
              subPath: med-chatboot-service.yml
            - name: med-config-repository
              mountPath: /config-repo/prod/med-gateway-service.yml
              subPath: med-gateway-service.yml
      volumes:
        - name: med-config-repository
          configMap:
            name: med-config-repository
