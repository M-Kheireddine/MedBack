apiVersion: apps/v1
kind: Deployment
metadata:
  name: med-postgres
  namespace: medback-tp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: med-postgres
  template:
    metadata:
      labels:
        app: med-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: med-user-service
  namespace: medback-tp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: med-user-service
  template:
    metadata:
      labels:
        app: med-user-service
    spec:
      containers:
        - name: app
          image: med-user-service:1.0
          # Tell Kubernetes to use the local image built through minikube docker-env.
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_APPLICATION_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SPRING_APPLICATION_NAME
            - name: MED_USER_SERVICE_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MED_USER_SERVICE_PORT
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SPRING_PROFILES_ACTIVE
            - name: EUREKA_CLIENT_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: EUREKA_CLIENT_ENABLED
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SPRING_DATASOURCE_URL
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SPRING_JPA_HIBERNATE_DDL_AUTO
            - name: JWT_EXPIRATION_MINUTES
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: JWT_EXPIRATION_MINUTES
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /api/actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/actuator/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 15
