apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: med-mongodb
  namespace: medback
  labels:
    app.kubernetes.io/name: med-mongodb
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: medback-platform
spec:
  serviceName: med-mongodb
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: med-mongodb
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: med-mongodb
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: medback-platform
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          imagePullPolicy: IfNotPresent
          ports:
            - name: mongodb
              containerPort: 27017
              protocol: TCP
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: medback-global-secret
                  key: MONGO_ROOT_USERNAME
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: medback-global-secret
                  key: MONGO_ROOT_PASSWORD
            - name: MONGO_INITDB_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: medback-global-config
                  key: MONGO_DATABASE
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - >
                  mongosh --quiet --username "$MONGO_INITDB_ROOT_USERNAME" --password "$MONGO_INITDB_ROOT_PASSWORD"
                  --authenticationDatabase admin --eval "db.adminCommand('ping').ok"
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - >
                  mongosh --quiet --username "$MONGO_INITDB_ROOT_USERNAME" --password "$MONGO_INITDB_ROOT_PASSWORD"
                  --authenticationDatabase admin --eval "db.adminCommand('ping').ok"
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
      volumes:
        - name: mongodb-data
          persistentVolumeClaim:
            claimName: med-mongodb-pvc
