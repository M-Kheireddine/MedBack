apiVersion: apps/v1
kind: Deployment
metadata:
  name: med-notification-service
  namespace: medback
  labels:
    app.kubernetes.io/name: med-notification-service
    app.kubernetes.io/component: business
    app.kubernetes.io/part-of: medback-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: med-notification-service
      app.kubernetes.io/component: business
  template:
    metadata:
      labels:
        app.kubernetes.io/name: med-notification-service
        app.kubernetes.io/component: business
        app.kubernetes.io/part-of: medback-platform
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /api/actuator/prometheus
        prometheus.io/port: "8085"
    spec:
      containers:
        - name: med-notification-service
          image: kheireddinemechergui/med-notification-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8085
              protocol: TCP
          envFrom:
            - configMapRef:
                name: medback-global-config
            - secretRef:
                name: medback-global-secret
          env:
            - name: SPRING_APPLICATION_NAME
              value: med-notification-service
            - name: MED_NOTIFICATION_SERVICE_PORT
              value: "8085"
          readinessProbe:
            httpGet:
              path: /api/actuator/health
              port: 8085
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /api/actuator/health
              port: 8085
            initialDelaySeconds: 45
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: "1"
              memory: 768Mi
