apiVersion: apps/v1
kind: Deployment
metadata:
  name: med-user-service
  namespace: medback
  labels:
    app.kubernetes.io/name: med-user-service
    app.kubernetes.io/component: business
    app.kubernetes.io/part-of: medback-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: med-user-service
      app.kubernetes.io/component: business
  template:
    metadata:
      labels:
        app.kubernetes.io/name: med-user-service
        app.kubernetes.io/component: business
        app.kubernetes.io/part-of: medback-platform
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /api/actuator/prometheus
        prometheus.io/port: "8081"
    spec:
      containers:
        - name: med-user-service
          image: kheireddinemechergui/medback-user-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          envFrom:
            - configMapRef:
                name: medback-global-config
            - secretRef:
                name: medback-global-secret
          env:
            - name: SPRING_APPLICATION_NAME
              value: med-user-service
            - name: MED_USER_SERVICE_PORT
              value: "8081"
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: medback-global-config
                  key: SPRING_DATASOURCE_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: medback-global-secret
                  key: DB_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: medback-global-secret
                  key: DB_PASSWORD
          readinessProbe:
            httpGet:
              path: /api/actuator/health/readiness
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /api/actuator/health/liveness
              port: 8081
            initialDelaySeconds: 45
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
