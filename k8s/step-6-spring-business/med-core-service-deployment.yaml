apiVersion: apps/v1
kind: Deployment
metadata:
  name: med-core-service
  namespace: medback
  labels:
    app.kubernetes.io/name: med-core-service
    app.kubernetes.io/component: business
    app.kubernetes.io/part-of: medback-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: med-core-service
      app.kubernetes.io/component: business
  template:
    metadata:
      labels:
        app.kubernetes.io/name: med-core-service
        app.kubernetes.io/component: business
        app.kubernetes.io/part-of: medback-platform
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /api/actuator/prometheus
        prometheus.io/port: "8083"
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: prepare-medication-storage
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - mkdir -p /app/storage/medications && chown -R 1000:1000 /app/storage
          volumeMounts:
            - name: medication-storage
              mountPath: /app/storage/medications
      containers:
        - name: med-core-service
          image: kheireddinemechergui/medback-core-service:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
          ports:
            - name: http
              containerPort: 8083
              protocol: TCP
          envFrom:
            - configMapRef:
                name: medback-global-config
            - secretRef:
                name: medback-global-secret
          env:
            - name: SPRING_APPLICATION_NAME
              value: med-core-service
            - name: MED_CORE_SERVICE_PORT
              value: "8083"
            - name: MONGO_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: medback-global-config
                  key: MONGO_DATABASE
            - name: MONGO_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: medback-global-secret
                  key: MONGO_ROOT_USERNAME
            - name: MONGO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: medback-global-secret
                  key: MONGO_ROOT_PASSWORD
            - name: SPRING_DATA_MONGODB_URI
              value: mongodb://$(MONGO_ROOT_USERNAME):$(MONGO_ROOT_PASSWORD)@med-mongodb:27017/$(MONGO_DATABASE)?authSource=admin
            - name: MEDICATION_IMAGE_DIRECTORY
              value: /app/storage/medications
            - name: MEDICATION_IMAGE_PUBLIC_PATH
              value: /api/uploads/medications
          readinessProbe:
            httpGet:
              path: /api/actuator/health/readiness
              port: 8083
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /api/actuator/health/liveness
              port: 8083
            initialDelaySeconds: 45
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              cpu: "1"
              memory: 1536Mi
          volumeMounts:
            - name: medication-storage
              mountPath: /app/storage/medications
      volumes:
        - name: medication-storage
          persistentVolumeClaim:
            claimName: med-core-storage-pvc
