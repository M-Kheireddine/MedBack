global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'med-user-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['med-user-service:8081']

  - job_name: 'med-core-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['med-core-service:8083']

  - job_name: 'med-chatboot-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['med-chatboot-service:8084']

  - job_name: 'med-notification-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['med-notification-service:8085']

  - job_name: 'med-config-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['med-config-service:8086']

  - job_name: 'med-discovery-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['med-discovery-service:8761']

  - job_name: 'med-gateway-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8080']
