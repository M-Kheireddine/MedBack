spring:
  application:
    name: MedCoreService
  cloud:
    config:
      enabled: false
    discovery:
      enabled: false
  mongodb:
    uri: mongodb://MED_CORE_USER:MED_CORE_PASSWORD@localhost:27017/MED_CORE_DB?authSource=admin
#    representation:
#      uuid: standard

server:
  port: 8083
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health, refresh
