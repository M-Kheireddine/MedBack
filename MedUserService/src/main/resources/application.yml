spring:
  application:
    name: MED_USER_SERVICE
  config:
    import: "optional:configserver:"
  cloud:
    config:
      enabled: false
    discovery:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:MED_USER_DB}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:MED_USER_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8081
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health, refresh


