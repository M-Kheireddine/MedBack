spring:
  application:
    name: med-user-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8086/api}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    open-in-view: false

server:
  port: ${MED_USER_SERVICE_PORT:8081}
  servlet:
    context-path: /api

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:true}
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus

medback:
  security:
    jwt:
      secret: ${JWT_SECRET:medback-jwt-secret-key-for-development-only-please-change}
      expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}
