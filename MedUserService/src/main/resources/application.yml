spring:
  application:
    name: MedUserService
  cloud:
    config:
      enabled: false
    discovery:
      enabled: false
  datasource:
    url: jdbc:postgresql://localhost:5432/MED_USER_DB
    username: postgres
    password: MED_USER_PASSWORD
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
server:
  port: 8081
management:
  endpoints:
    web:
      exposure:
        include: health, refresh


