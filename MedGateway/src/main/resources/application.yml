spring:
  application:
    name: MED_GATEWAY
  config:
    import: "optional:configserver:"
  cloud:
    config:
      enabled: false
    discovery:
      enabled: true
  main:
    web-application-type: reactive

server:
  port: 8080
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health, refresh

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}