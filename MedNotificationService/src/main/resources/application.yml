spring:
  application:
    name: med-notification-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8086/api}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: med-notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: tn.iteam.mednotificationservice.dtos.events.NotificationEvent
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}

server:
  port: ${MED_NOTIFICATION_SERVICE_PORT:8085}
  servlet:
    context-path: /api

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:true}
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus

medback:
  kafka:
    topics:
      appointment: appointment_topic
      prescription: prescription_topic
  mail:
    from: ${MAIL_FROM:no-reply@medback.local}
    simulation-enabled: ${MAIL_SIMULATION_ENABLED:true}
