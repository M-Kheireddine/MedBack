spring:
  application:
    name: med-chatboot-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8086/api}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  ai:
    model:
      chat: ollama
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        model: ${OLLAMA_CHAT_MODEL:llama3}
        temperature: ${OLLAMA_CHAT_TEMPERATURE:0.4}

server:
  port: ${MED_CHATBOT_SERVICE_PORT:8084}
  servlet:
    context-path: /api

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:true}
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus

logging:
  level:
    org.springframework.ai: DEBUG
    org.springframework.web: DEBUG

medback:
  chatbot:
    system-prompt: >
      You are an expert medical AI assistant helping a doctor. Provide concise,
      professional, and accurate medical insights based strictly on the provided
      symptoms.
