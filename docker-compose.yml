  med-core-service:
    build:
      context: .
      dockerfile: MedCoreService/Dockerfile
    container_name: med-core-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    env_file:
      - .env
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/${MONGO_DATABASE}?authSource=admin
    depends_on:
      - mongo

volumes:
  postgres_user_data:
  mongo_core_data: